<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — JayBy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">

  <div class="auth-blob blob-1"></div>
  <div class="auth-blob blob-2"></div>
  <div class="auth-blob blob-3"></div>
  <div class="auth-blob blob-4"></div>
  <img class="auth-mark mark-1" src="assets/jayby-icon.png" alt="">
  <img class="auth-mark mark-2" src="assets/jayby-icon.png" alt="">
  <img class="auth-mark mark-3" src="assets/jayby-icon.png" alt="">

  <div class="auth-card-wrap">
    <img class="auth-logo" src="img/logo JayBy - Texto.png" alt="JayBy">

    <h1>Bem-vindo de volta</h1>
    <p class="auth-sub">Entre pra continuar sua linha de produção.</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="loginForm">
      <div class="field-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="voce@email.com" required>
      </div>
      <div class="field-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Sua senha" required>
      </div>

      <div class="field-row">
        <label class="checkbox-row">
          <input type="checkbox">
          Lembrar de mim
        </label>
        <a class="link-teal" href="#">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn btn-solid">Entrar</button>
    </form>

    <div class="auth-divider">ou continue com</div>
    <div class="social-row">
      <button class="social-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
        Google
      </button>
      <button class="social-btn">
        <svg width="16" height="16" viewBox="0 0 23 23"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg>
        Microsoft
      </button>
      <button class="social-btn">
        <svg width="15" height="18" viewBox="0 0 384 512"><path fill="#000" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.2-52.3.8-107.9 41.6-107.9 124.2 0 24.6 4.5 50 13.5 76.2 12 34.4 55.1 118.8 100 117.4 23.6-.6 40.3-16.8 71.1-16.8 29.9 0 45.2 16.8 71.5 16.8 45.3-.7 84.3-77.5 95.8-112-60.2-28.4-58.2-83.1-44.4-77.9zM255.7 84.4c14.5-18.1 25.5-43.6 22.7-69.7-22.1 1.5-48.4 15.4-64.1 33.6-14.2 16.5-26.6 42.7-23.2 67.6 24.2 1.9 48.9-12.2 64.6-31.5z"/></svg>
        Apple
      </button>
    </div>

    <p class="auth-switch" style="margin-top:18px;">Não tem conta? <a class="link-teal" href="cadastro.html">Cadastre-se</a></p>
  </div>

</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    const msg = document.getElementById('formMsg');
    msg.textContent = "Login simulado! (protótipo de front-end — ainda sem backend conectado)";
    msg.className = "form-msg show ok";
  });
</script>

</body>
</html>
